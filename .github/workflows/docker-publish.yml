# Hermes Gateway — Docker 镜像自动构建与发布
# 触发条件：推送匹配 release-v* 的 tag 时自动构建并推送到镜像仓库
#
# 需要在仓库 Settings → Secrets and variables → Actions 中配置：
#
#   DOCKER_REGISTRY_URL       （必填）镜像仓库地址，如 registry.cn-hangzhou.aliyuncs.com
#   DOCKER_REGISTRY_USERNAME  （必填）登录用户名
#   DOCKER_REGISTRY_PASSWORD  （必填）登录密码 / Token
#   IMAGE_NAME                （可选）镜像名，默认 hermes-gateway
---
name: Build & Push Docker Image

on:
  push:
    tags:
      - 'release-v*'

env:
  REGISTRY: ${{ secrets.DOCKER_REGISTRY_URL }}
  IMAGE_NAME: ${{ vars.IMAGE_NAME || 'hermes-gateway' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          # release-v1.1.5 → v1.1.5
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#release-}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
