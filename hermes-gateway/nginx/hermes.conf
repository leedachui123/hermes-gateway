# Hermes Gateway - Nginx 配置
# 使用方法：
#   1. 生成自签证书：openssl req -x509 -newkey rsa:4096 -keyout hermes.key -out hermes.crt -days 365 -nodes -subj "/CN=<服务器IP>"
#   2. 将证书放入 /etc/nginx/ssl/
#   3. 将此文件链接到 /etc/nginx/conf.d/
#   4. 重启 nginx

upstream hermes_gateway {
    server 127.0.0.1:8000;
}

# HTTP -> HTTPS 重定向
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS 服务
server {
    listen 443 ssl http2;
    server_name _;

    # 自签证书路径（请根据实际修改）
    ssl_certificate     /etc/nginx/ssl/hermes.crt;
    ssl_certificate_key /etc/nginx/ssl/hermes.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 安全头
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    # 禁止直接访问 Hermes 内部 API（除登录外）
    location / {
        proxy_pass http://hermes_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（如需）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
