<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hermes Gateway - Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 40px;
      width: 360px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
    }
    h1 {
      font-size: 22px; font-weight: 600;
      text-align: center; margin-bottom: 8px;
    }
    p.subtitle {
      font-size: 14px; color: #666;
      text-align: center; margin-bottom: 28px;
    }
    .error {
      background: #fff2f0; border: 1px solid #ffccc7;
      border-radius: 6px; padding: 8px 12px; margin-bottom: 16px;
      font-size: 13px; color: #cf1322;
    }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 10px 12px; border: 1px solid #d9d9d9;
      border-radius: 8px; font-size: 14px; margin-bottom: 16px;
      transition: border-color .2s;
    }
    input:focus { border-color: #4096ff; outline: none; box-shadow: 0 0 0 2px rgba(64,150,255,.2); }
    button {
      width: 100%; padding: 10px; font-size: 15px; font-weight: 500;
      background: #1677ff; color: #fff; border: none; border-radius: 8px;
      cursor: pointer; transition: background .2s;
    }
    button:hover { background: #4096ff; }
    .footer { text-align: center; font-size: 12px; color: #999; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔐 Hermes Gateway</h1>
    <p class="subtitle">Please sign in to continue</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/api/login">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required autofocus>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>

      <button type="submit">Sign In</button>
    </form>

    <div class="footer">Hermes Gateway v0.1.0</div>
  </div>
</body>
</html>
